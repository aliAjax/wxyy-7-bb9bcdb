<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>极地科考站值班</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="shell">
    <header class="hero">
      <div>
        <p class="eyebrow">Polar Station Shift</p>
        <h1>极地科考站值班</h1>
      </div>
    </header>

    <section id="missionDesk" class="mission-desk panel">
      <h2>任务选择台</h2>
      <p class="mission-desc">选择一项科考任务，不同任务拥有不同的初始资源、数据目标和结算方式。</p>
      <div id="missionCards" class="mission-cards"></div>
      <div class="mission-action">
        <button id="startBtn" type="button" disabled>确认任务并进入电力分配</button>
      </div>
    </section>

    <section class="dashboard">
      <section class="station">
        <div class="sky">
          <span id="weatherIcon">晴</span>
        </div>
        <div class="modules">
          <div class="module heat">供暖</div>
          <div class="module comm">通信</div>
          <div class="module lab">实验</div>
          <div class="module food">食物</div>
        </div>
      </section>

      <aside class="panel">
        <h2>状态</h2>
        <div class="stat-grid">
          <span>天数<strong id="day">1/7</strong></span>
          <span>天气<strong id="weather">晴朗</strong></span>
          <span>柴油<strong id="fuel">80</strong></span>
          <span>士气<strong id="morale">75</strong></span>
          <span>食物<strong id="food">70</strong></span>
          <span>数据<strong id="data">0</strong></span>
        </div>
      </aside>
    </section>

    <section id="controlsPanel" class="controls-panel hidden">
      <div class="section-title">
        <h2>今日电力分配</h2>
        <span>可用电力 <strong id="powerLeft">12</strong></span>
      </div>
      <div id="allocations" class="allocations"></div>
      <button id="endDayBtn" class="primary" type="button">结束今天</button>
    </section>

    <section class="lower">
      <section class="panel">
        <h2>预报与提示</h2>
        <p id="forecast" class="forecast">等待开始值班。</p>
      </section>
      <section class="panel">
        <h2>日志</h2>
        <div id="log" class="log"></div>
      </section>
    </section>

    <section class="archive panel">
      <div class="archive-head">
        <div>
          <h2>值班档案馆</h2>
          <p class="archive-desc">记录过往值班的最终数据与结局。</p>
        </div>
        <div class="archive-actions">
          <button id="clearArchiveBtn" type="button">清空档案</button>
        </div>
      </div>
      <div id="archiveEmpty" class="archive-empty">
        <p>暂无值班记录，完成一次值班后档案将自动保存于此。</p>
      </div>
      <div id="archiveList" class="archive-list"></div>
    </section>

    <section id="result" class="result hidden"></section>
  </main>

  <div id="tutorialOverlay" class="tutorial-overlay hidden">
    <div class="tutorial-mask"></div>
    <div id="tutorialHighlight" class="tutorial-highlight"></div>
    <div id="tutorialCard" class="tutorial-card">
      <div class="tutorial-step-indicator">
        <span id="tutorialStepNum">1</span> / <span id="tutorialStepTotal">3</span>
      </div>
      <h3 id="tutorialTitle">步骤标题</h3>
      <p id="tutorialDesc">步骤说明内容</p>
      <div id="tutorialSystems" class="tutorial-systems hidden"></div>
      <div class="tutorial-actions">
        <button id="tutorialSkipBtn" type="button" class="tutorial-skip">跳过引导</button>
        <div class="tutorial-nav">
          <button id="tutorialPrevBtn" type="button" class="tutorial-prev">上一步</button>
          <button id="tutorialNextBtn" type="button" class="tutorial-next">下一步</button>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
